<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2015-2026臺藝大視傳系研討會論文分佈</title>
    <style>
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
        }

        body {
            background-color: #111111;
            overflow: hidden; 
            height: 100vh; 
            width: 100vw; 
            position: relative;
        }

        /* 1. 底圖背景層 */
        .bg-layer {
            position: absolute;
            top: -5%; 
            left: -5%; 
            width: 110%; 
            height: 110%;
            background-image: url('./img/background.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 1;
            /* 讓背景移動更平滑 */
            transition: transform 0.1s ease-out; 
        }

        /* 2. 浮動元素共同設定 */
        .floating-layer {
            position: absolute;
            z-index: 2;
            transition: transform 0.1s ease-out;
            /* 重要：讓滑鼠事件穿透，避免干擾下方按鈕的 hover 判定 */
            pointer-events: none; 
        }

        /* --- 視覺元素定位 (參考 homepage.jpg) --- */
        .dots {
            top: 10%;
            right: 2%;
            width: 45%;
            opacity: 0.8; 
        }

        .line {
            top: 28%;
            left: 20%;
            width: 58%;
        }

        .ntua-vcd {
            top: 16%;
            left: 5%;
            width: 32%;
        }

        .year-2016 {
            top: 65%;
            left: 5%;
            width: 12%;
        }

        .year-2025 {
            top: 22%;
            right: 4%;
            width: 12%;
        }

        .title-img {
            top: 38%;
            left: 0;
            right: 0;
            margin: auto; /* 水平置中 */
            width: 45%;
        }

        /* --- 互動按鈕區塊 --- */
        .enter-container {
            top: 62%;
            left: 0;
            right: 0;
            margin: auto; /* 水平置中 */
            width: 14%;   /* 按鈕寬度，可依視覺微調 */
            aspect-ratio: 3 / 1; /* 維持按鈕圖檔比例 */
            z-index: 10;
            pointer-events: auto; /* 覆蓋上方共同設定，允許此區塊接收滑鼠事件 */
        }

        .enter-btn {
            display: block;
            width: 100%;
            height: 100%;
            /* 預設狀態圖檔 */
            background-image: url('./img/enter_default.png');
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            cursor: pointer;
        }

        /* 懸停 (Hover) 狀態 */
        .enter-btn:hover {
            background-image: url('./img/enter_hover.png');
        }

        /* 點擊 (Active) 狀態 */
        .enter-btn:active {
            background-image: url('./img/enter_active.png');
        }

    </style>
</head>
<body>

    <div class="bg-layer" id="bg-layer"></div>

    <img src="./img/點點點.png" class="floating-layer dots" data-speed="0.015" alt="">
    <img src="./img/線.png" class="floating-layer line" data-speed="-0.02" alt="">
    <img src="./img/ntua vcd.png" class="floating-layer ntua-vcd" data-speed="0.04" alt="">
    <img src="./img/2016.png" class="floating-layer year-2016" data-speed="0.03" alt="">
    <img src="./img/2025.png" class="floating-layer year-2025" data-speed="0.05" alt="">
    
    <img src="./img/title.png" class="floating-layer title-img" data-speed="0.025" alt="國立臺灣藝術大學研討會論文分佈">

    <div class="floating-layer enter-container" data-speed="0.035">
        <a href="index_2.html" class="enter-btn" aria-label="點擊進入"></a>
    </div>

    <script>
        let isTicking = false;
        const bgLayer = document.getElementById('bg-layer');
        const floatingLayers = document.querySelectorAll('.floating-layer');

        document.addEventListener('mousemove', function(e) {
            if (!isTicking) {
                window.requestAnimationFrame(function() {
                    const centerX = window.innerWidth / 2;
                    const centerY = window.innerHeight / 2;
                    
                    // 背景底圖移動邏輯
                    const bgX = (centerX - e.pageX) / 90;
                    const bgY = (centerY - e.pageY) / 90;
                    bgLayer.style.transform = `translate(${bgX}px, ${bgY}px)`;

                    // 各圖層視差偏移邏輯
                    floatingLayers.forEach(layer => {
                        const speed = parseFloat(layer.getAttribute('data-speed'));
                        const x = (centerX - e.pageX) * speed;
                        const y = (centerY - e.pageY) * speed;
                        layer.style.transform = `translate(${x}px, ${y}px)`;
                    });

                    isTicking = false;
                });
                isTicking = true;
            }
        });
    </script>
</body>
</html>
